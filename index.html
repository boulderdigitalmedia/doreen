<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="From Jake" />
  <meta name="theme-color" content="#f5f2ec" />
  <title>From Jake, With Love</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f2ec;
      --surface:   #ffffff;
      --sage:      #7a9e7e;
      --sage-light:#c8dbc9;
      --sage-pale: #e8f0e8;
      --ink:       #2c3a2e;
      --ink-mid:   #5a6e5c;
      --ink-soft:  #8fa391;
      --cream:     #faf8f3;
      --border:    #dde8dd;
      --shadow:    rgba(80, 110, 85, 0.10);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
      opacity: 0;
      animation: fadeDown 0.7s ease 0.1s forwards;
    }

    .brand { display: flex; flex-direction: column; }

    .brand-from {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      font-weight: 300;
      color: var(--ink);
      line-height: 1.1;
    }

    .date-badge {
      background: var(--sage-pale);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 11px;
      font-weight: 400;
      color: var(--sage);
      letter-spacing: 0.04em;
    }

    /* CARD VIEWPORT */
    .card-viewport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 0;
      overflow: hidden;
    }

    /* CARD */
    .card {
      width: 100%;
      max-width: 390px;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 2px 8px var(--shadow), 0 12px 40px var(--shadow);
      overflow: hidden;
      opacity: 0;
      animation: riseIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    /* PHOTO */
    .card-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--sage-pale);
      position: relative;
      overflow: hidden;
    }

    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.5s ease;
    }

    .card-photo img.loading { opacity: 0; }

    .photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--ink-soft);
    }

    .photo-placeholder .ph-icon {
      width: 52px;
      height: 52px;
      border: 1.5px dashed var(--sage-light);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .photo-placeholder .ph-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sage);
      opacity: 0.8;
    }

    .photo-placeholder .ph-hint {
      font-size: 10px;
      color: var(--ink-soft);
      opacity: 0.45;
      font-family: monospace;
    }

    .photo-day-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      padding: 5px 11px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-mid);
    }

    .today-ribbon {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--sage);
      border-radius: 10px;
      padding: 5px 11px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
    }

    /* CARD BODY */
    .card-body { padding: 26px 28px 30px; }

    .card-quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 21px;
      font-weight: 300;
      line-height: 1.62;
      color: var(--ink);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .card-quote.fading { opacity: 0; transform: translateY(6px); }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .card-sig {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      font-weight: 300;
      color: var(--sage);
    }

    .card-heart {
      font-size: 18px;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    /* LOCK */
    .lock-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(245, 242, 236, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }

    .card.locked .lock-overlay { display: flex; }

    .lock-icon-wrap {
      width: 52px;
      height: 52px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px var(--shadow);
      font-size: 22px;
    }

    .lock-msg {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
    }

    .lock-date {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--sage);
    }

    /* BOTTOM NAV */
    .bottom-bar {
      padding: 18px 24px calc(env(safe-area-inset-bottom) + 16px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.7s forwards;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--ink-mid);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow);
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn:not(:disabled):active {
      background: var(--sage-pale);
      border-color: var(--sage-light);
      transform: scale(0.93);
    }

    .nav-btn:disabled { opacity: 0.22; cursor: default; box-shadow: none; }

    .nav-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 60px;
      justify-content: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: var(--sage-light);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .dot.active { width: 20px; background: var(--sage); }

    .progress-track {
      width: 100%;
      max-width: 260px;
      height: 3px;
      background: var(--sage-pale);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--sage-light), var(--sage));
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    /* INSTALL BANNER */
    .install-banner {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      left: 16px;
      right: 16px;
      background: var(--ink);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      transform: translateY(120px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .install-banner.show { transform: translateY(0); }
    .install-banner span { flex: 1; font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 300; }

    .install-btn {
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div class="brand">
      <span class="brand-from">A note</span>

  </div>

    </div>
    <div class="progress-track">

    </div>
    <div class="progress-label" id="progressLabel"></div>

</div>

<div class="install-banner" id="installBanner">

  <button class="install-btn" id="installBtn">Install</button>
</div>

  function getDaysElapsed() {
    const start = new Date(START_DATE);
    start.setHours(0,0,0,0);
    const now = new Date();
    now.setHours(0,0,0,0);
    return Math.max(0, Math.floor((now - start) / 86400000));
  }

  function fmtShort(d) {
    return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
  }

  function fmtLong(d) {
    return d.toLocaleDateString('en-NZ', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function unlockDate(i) {
    const d = new Date(START_DATE);
    d.setDate(d.getDate() + i);
    return fmtLong(d);
  }

  const daysElapsed    = getDaysElapsed();
  const todayNoteIndex = Math.min(daysElapsed, notes.length - 1);
  let   currentIndex   = todayNoteIndex;

  const dateBadgeEl    = document.getElementById('dateBadge');
  const cardEl         = document.getElementById('card');
  const placeholderEl  = document.getElementById('photoPlaceholder');
  const phHintEl       = document.getElementById('phHint');
  const cardImgEl      = document.getElementById('cardImg');
  const dayBadgeEl     = document.getElementById('dayBadge');
  const todayRibbonEl  = document.getElementById('todayRibbon');
  const lockOverlayEl  = document.getElementById('lockOverlay');
  const lockDateEl     = document.getElementById('lockDate');
  const cardQuoteEl    = document.getElementById('cardQuote');
  const dotsEl         = document.getElementById('navDots');
  const progressFillEl = document.getElementById('progressFill');
  const progressLblEl  = document.getElementById('progressLabel');
  const prevBtn        = document.getElementById('prevBtn');
  const nextBtn        = document.getElementById('nextBtn');

  dateBadgeEl.textContent = fmtShort(new Date());

  function renderDots() {
    dotsEl.innerHTML = '';
    const unlocked = todayNoteIndex + 1;
    if (unlocked <= 1) return;
    const start = Math.max(0, unlocked - 7);
    for (let i = start; i < unlocked; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === currentIndex ? ' active' : '');
      dotsEl.appendChild(d);
    }
  }

  function showNote(index, animate) {
    if (animate === undefined) animate = true;
    const note    = notes[index];
    const isToday = index === todayNoteIndex;
    const locked  = index > daysElapsed || index >= notes.length;

    if (animate) cardQuoteEl.classList.add('fading');

    setTimeout(function() {
      cardQuoteEl.textContent = note.text;
      if (animate) cardQuoteEl.classList.remove('fading');

      dayBadgeEl.textContent = isToday ? 'Today · Day ' + (index+1) : 'Day ' + (index+1);
      todayRibbonEl.style.display = isToday ? 'block' : 'none';

      if (locked) {
        cardEl.classList.add('locked');
        lockDateEl.textContent = unlockDate(index);
        lockOverlayEl.style.display = 'flex';
      } else {
        cardEl.classList.remove('locked');
        lockOverlayEl.style.display = 'none';
      }

      var src = note.photo || '';
      if (src) {
        placeholderEl.style.display = 'none';
        cardImgEl.style.display = 'block';
        cardImgEl.classList.add('loading');
        var tmp = new Image();
        tmp.onload = function() {
          cardImgEl.src = src;
          requestAnimationFrame(function() { cardImgEl.classList.remove('loading'); });
        };
        tmp.onerror = function() {
          cardImgEl.style.display = 'none';
          placeholderEl.style.display = 'flex';
          phHintEl.textContent = src;
        };
        tmp.src = src;
      } else {
        cardImgEl.style.display = 'none';
        placeholderEl.style.display = 'flex';
        phHintEl.textContent = 'photos/' + String(index+1).padStart(2,'0') + '.jpg';
      }
    }, animate ? 200 : 0);

    prevBtn.disabled = index <= 0;
    nextBtn.disabled = index >= todayNoteIndex;

    var pct = notes.length > 1 ? ((todayNoteIndex+1)/notes.length)*100 : 100;
    progressFillEl.style.width = pct + '%';
    progressLblEl.textContent  = (todayNoteIndex+1) + ' of ' + notes.length + ' unlocked';

    renderDots();
  }

  showNote(currentIndex, false);

  prevBtn.addEventListener('click', function() {
    if (currentIndex > 0) { currentIndex--; showNote(currentIndex); }
  });
  nextBtn.addEventListener('click', function() {
    if (currentIndex < todayNoteIndex) { currentIndex++; showNote(currentIndex); }
  });

  var tx = 0;
  document.addEventListener('touchstart', function(e) { tx = e.touches[0].clientX; }, { passive:true });
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 44) {
      if (dx < 0 && currentIndex < todayNoteIndex) { currentIndex++; showNote(currentIndex); }
      else if (dx > 0 && currentIndex > 0)          { currentIndex--; showNote(currentIndex); }
    }
  }, { passive:true });

  var deferredPrompt;
  var banner     = document.getElementById('installBanner');
  var installBtn = document.getElementById('installBtn');
  var installMsg = document.getElementById('installMsg');

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(function() { banner.classList.add('show'); }, 4000);
  });

  installBtn.addEventListener('click', function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
    }
    banner.classList.remove('show');
  });

  var isIOS        = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  var isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) {
    installMsg.textContent = 'Tap Share → Add to Home Screen';
    installBtn.style.display = 'none';
    setTimeout(function() { banner.classList.add('show'); }, 4000);
    setTimeout(function() { banner.classList.remove('show'); }, 10000);
  }

  // ── Push notifications ────────────────────────────────────────
  // Replace with your Render server URL after deploying
  var PUSH_SERVER = 'https://YOUR-RENDER-APP.onrender.com';

  // VAPID public key — must match the server
  var VAPID_PUBLIC_KEY = 'BFJ82UKXOvphp1uCUkCck0U_vCkUZte1GLifyRHei241MNaD71dUrDpPDtz0B34l3Ou3Ln51xIUKTwlvJfWmZkg';

  function urlBase64ToUint8Array(base64String) {
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var rawData = window.atob(base64);
    var outputArray = new Uint8Array(rawData.length);
    for (var i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }

  function subscribeToPush(reg) {
    reg.pushManager.getSubscription().then(function(existing) {
      if (existing) return; // already subscribed
      reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      }).then(function(subscription) {
        fetch(PUSH_SERVER + '/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(subscription)
        }).then(function(r) {
          if (r.ok) console.log('Push subscription registered');
        }).catch(function(e) { console.warn('Could not register push:', e); });
      }).catch(function(e) { console.warn('Push subscribe failed:', e); });
    });
  }

  if ('serviceWorker' in navigator && 'PushManager' in window) {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      // Ask for notification permission after a short delay
      // (don't interrupt the first-time experience immediately)
      setTimeout(function() {
        if (Notification.permission === 'default') {
          Notification.requestPermission().then(function(permission) {
            if (permission === 'granted') subscribeToPush(reg);
          });
        } else if (Notification.permission === 'granted') {
          subscribeToPush(reg);
        }
      }, 8000);
    }).catch(function(){});
  } else if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
</script>
</body>
</html>
